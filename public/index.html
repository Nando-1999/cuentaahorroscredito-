<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro | ContaSistemas S.A.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #0f172a;   
            --accent-cyan: #06b6d4;    
            --accent-blue: #3b82f6;
            --plomo-pizarra: #94a3b8;  
            --white: #ffffff;
            --glass-bg: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--primary-blue);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(6, 182, 212, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            overflow: hidden;
            position: relative;
        }

        /* Luces de fondo */
        .blur-sphere {
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--accent-cyan);
            filter: blur(120px);
            opacity: 0.1;
            z-index: 0;
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.1; }
            100% { transform: scale(1.2); opacity: 0.2; }
        }

        /* Tarjeta Principal */
        .login-card {
            width: 1050px;
            height: 650px;
            display: flex;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            z-index: 10;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Lado Izquierdo */
        .side-info {
            flex: 1.1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.1), transparent);
            border-right: 1px solid var(--glass-border);
            position: relative;
        }

        .side-info::after {
            content: "";
            position: absolute;
            bottom: 40px;
            left: 60px;
            width: 50px;
            height: 4px;
            background: var(--accent-cyan);
            border-radius: 2px;
        }

        .side-info h2 { 
            font-size: 3rem; 
            font-weight: 800; 
            color: var(--white);
            line-height: 1;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        .side-info p { 
            font-size: 1.1rem; 
            color: var(--plomo-pizarra); 
            line-height: 1.6;
            font-weight: 500;
        }

        .stats-preview {
            margin-top: 40px;
            display: flex;
            gap: 20px;
        }

        .stat-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
        }

        .stat-item span { display: block; color: var(--accent-cyan); font-weight: 800; font-size: 1.2rem; }
        .stat-item small { color: var(--plomo-pizarra); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }

        /* Lado Derecho */
        .side-form {
            flex: 1;
            padding: 80px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .side-form h1 { color: var(--white); font-size: 2.2rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px; }
        .side-form span { color: var(--plomo-pizarra); margin-bottom: 40px; display: block; font-size: 1rem; font-weight: 500; }

        .input-group { margin-bottom: 20px; position: relative; }

        .input-group i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-cyan);
            transition: 0.3s;
        }

        .input-group input {
            width: 100%;
            padding: 18px 20px 18px 55px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--accent-cyan);
            background: rgba(6, 182, 212, 0.05);
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.1);
        }

        .input-group input:focus + i { color: var(--white); }

        .btn-login {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(135deg, var(--accent-cyan), #0891b2);
            color: var(--primary-blue);
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(6, 182, 212, 0.3);
            filter: brightness(1.1);
        }

        #mensaje-estado {
            margin-top: 25px;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 600;
            min-height: 25px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .login-card { width: 95%; height: auto; flex-direction: column; border-radius: 30px; }
            .side-info { padding: 40px; border-right: none; border-bottom: 1px solid var(--glass-border); }
            .side-info h2 { font-size: 2rem; }
            .side-form { padding: 40px; }
        }
    </style>
</head>
<body>

    <div class="blur-sphere" style="top: -100px; left: -100px;"></div>
    <div class="blur-sphere" style="bottom: -100px; right: -100px; background: var(--accent-blue);"></div>

    <div class="login-card">
        <div class="side-info">
            <h2>ContaSistemas</h2>
            <p>Evoluciona tu gestión financiera con el core bancario diseñado para Quito.</p>
            
            <div class="stats-preview">
                <div class="stat-item">
                    <span>100%</span>
                    <small>Seguro</small>
                </div>
                <div class="stat-item">
                    <span>Real-Time</span>
                    <small>Datos</small>
                </div>
                <div class="stat-item">
                    <span>v3.0</span>
                    <small>Versión</small>
                </div>
            </div>
        </div>

        <div class="side-form">
            <h1>Bienvenddos Caja Ahorro y Crédito</h1>
            <span>Acceso seguro a la administración</span>

            <form id="formLogin" onsubmit="event.preventDefault(); ejecutarLogin();">
                <div class="input-group">
                    <i class="fas fa-user-circle"></i>
                    <input type="text" id="usuario" placeholder="Nombre de usuario" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-shield-alt"></i>
                    <input type="password" id="password" placeholder="Contraseña segura" required>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    Iniciar Sesión <i class="fas fa-chevron-right"></i>
                </button>
            </form>

            <div id="mensaje-estado"></div>
        </div>
    </div>

    <script>
        async function ejecutarLogin() {
            const user = document.getElementById('usuario').value;
            const pass = document.getElementById('password').value;
            const msg = document.getElementById('mensaje-estado');
            const btn = document.getElementById('btnLogin');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Validando...';
            msg.style.color = "var(--plomo-pizarra)";
            msg.innerHTML = "Consultando servidor seguro...";

            try {
                const res = await fetch('http://localhost:3000/api/auth/login', {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ username: user, password: pass })
                });

                const data = await res.json();

                if (res.ok) {
                    msg.style.color = "#10b981";
                    msg.innerHTML = '<i class="fas fa-check-double"></i> Acceso autorizado. Entrando...';
                    localStorage.setItem('token', data.token);
                    setTimeout(() => window.location.href = 'panel.html', 800);
                } else {
                    msg.style.color = "#f43f5e";
                    msg.innerHTML = '<i class="fas fa-times-circle"></i> Error en las credenciales';
                    btn.disabled = false;
                    btn.innerHTML = 'Iniciar Sesión <i class="fas fa-chevron-right"></i>';
                }
            } catch (err) {
                msg.style.color = "#f43f5e";
                msg.innerHTML = '❌ Sin conexión con ContaSistemas Core';
                btn.disabled = false;
                btn.innerHTML = 'Iniciar Sesión <i class="fas fa-chevron-right"></i>';
            }
        }
    </script>
</body>
</html>
