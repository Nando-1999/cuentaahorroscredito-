<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Libro Diario | ContaSistemas S.A.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #06b6d4; --bg: #f8fafc; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        .sidebar { width: 280px; background: var(--primary); color: white; padding: 30px 20px; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }

        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .filters { display: flex; gap: 15px; background: white; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 25px; }
        
        input[type="date"] { padding: 8px; border: 1px solid #cbd5e1; border-radius: 8px; }

        .entry-card { background: white; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 15px; overflow: hidden; transition: 0.3s; }
        .entry-header { background: #f8fafc; padding: 15px 25px; display: grid; grid-template-columns: 120px 1fr 150px 120px; align-items: center; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        .entry-header:hover { background: #f1f5f9; }

        .entry-details { padding: 20px 50px; background: #fff; display: none; border-top: 1px solid #f1f5f9; }
        .entry-details table { width: 100%; border-collapse: collapse; }
        .entry-details th { text-align: left; font-size: 0.7rem; color: #94a3b8; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .entry-details td { padding: 10px 0; border-bottom: 1px dashed #f1f5f9; font-size: 0.85rem; }

        .badge { font-size: 0.65rem; padding: 4px 10px; border-radius: 6px; font-weight: 800; text-transform: uppercase; width: fit-content; }
        .badge-ahorros, .badge-depositos { background: #dcfce7; color: #166534; }
        .badge-creditos, .badge-prestamos { background: #fef9c3; color: #854d0e; }
        .badge-cobranzas { background: #e0f2fe; color: #075985; }

        .amount { font-weight: 800; text-align: right; }
        .debit { color: #059669; }
        .credit { color: #dc2626; }
        
        .empty-state { text-align: center; padding: 50px; color: #94a3b8; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div style="margin-bottom: 40px; font-weight: 800; font-size: 1.2rem;">
            <i class="fas fa-building-columns"></i> CONTA SISTEMAS
        </div>
        <nav>
            <a href="panel.html" style="color:#94a3b8; text-decoration:none; display:flex; align-items:center; gap:10px; margin-bottom:20px;">
                <i class="fas fa-chart-pie"></i> Dashboard
            </a>
            <a href="libro-diario.html" style="color:var(--accent); text-decoration:none; display:flex; align-items:center; gap:10px; font-weight:700;">
                <i class="fas fa-book"></i> Libro Diario
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="header-flex">
            <div>
                <h1>Libro Diario General</h1>
                <p style="color: #64748b;">Auditoría de todos los asientos contables registrados.</p>
            </div>
            <button onclick="window.print()" style="padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600;">
                <i class="fas fa-print"></i> Imprimir Reporte
            </button>
        </div>

        <div class="filters">
            <div style="display:flex; align-items:center; gap:10px;">
                <label style="font-size:0.8rem; font-weight:700;">DESDE:</label>
                <input type="date" id="fecha-inicio">
            </div>
            <div style="display:flex; align-items:center; gap:10px;">
                <label style="font-size:0.8rem; font-weight:700;">HASTA:</label>
                <input type="date" id="fecha-fin">
            </div>
            <button onclick="cargarLibro()" style="background: var(--accent); color: white; border: none; padding: 8px 25px; border-radius: 8px; cursor: pointer; font-weight: 700;">
                <i class="fas fa-filter"></i> FILTRAR
            </button>
        </div>

        <div id="lista-asientos">
            <div class="empty-state">Cargando movimientos...</div>
        </div>
    </main>

    <script>
        async function cargarLibro() {
            const contenedor = document.getElementById('lista-asientos');
            try {
                const res = await fetch('/api/journal/historial');
                
                // Validación de respuesta del servidor
                if (!res.ok) {
                    throw new Error(`Error en el servidor (${res.status})`);
                }

                const asientos = await res.json();

                if (!asientos || asientos.length === 0) {
                    contenedor.innerHTML = '<div class="empty-state">No se encontraron asientos contables.</div>';
                    return;
                }

                contenedor.innerHTML = asientos.map(a => `
                    <div class="entry-card">
                        <div class="entry-header" onclick="toggleDetalle(${a.id})">
                            <span style="color: #64748b; font-weight: 600; font-size: 0.9rem;">
                                ${new Date(a.fecha).toLocaleDateString('es-EC', { day: '2-digit', month: '2-digit', year: 'numeric' })}
                            </span>
                            <span style="font-weight: 700; color: #1e293b;">${a.description}</span>
                            <span class="badge badge-${a.referencia_modulo.toLowerCase()}">${a.referencia_modulo}</span>
                            <span class="amount" style="color: var(--primary);">$${parseFloat(a.total).toFixed(2)}</span>
                        </div>
                        <div id="detalle-${a.id}" class="entry-details">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Cuenta</th>
                                        <th>Concepto</th>
                                        <th style="text-align: right;">Debe</th>
                                        <th style="text-align: right;">Haber</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${a.detalles && a.detalles[0].cuenta !== null ? a.detalles.map(d => `
                                        <tr>
                                            <td style="font-family: monospace; font-weight: 700; color: var(--accent);">${d.cuenta}</td>
                                            <td>Registro Contable ${d.cuenta}</td>
                                            <td class="amount debit">${d.debe > 0 ? '$' + parseFloat(d.debe).toFixed(2) : '-'}</td>
                                            <td class="amount credit">${d.haber > 0 ? '$' + parseFloat(d.haber).toFixed(2) : '-'}</td>
                                        </tr>
                                    `).join('') : '<tr><td colspan="4">Sin detalles contables</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error("Error al cargar el libro diario:", error);
                contenedor.innerHTML = `
                    <div class="empty-state" style="color: #ef4444;">
                        <i class="fas fa-exclamation-triangle"></i><br>
                        Error al conectar con la base de datos.<br>
                        <small>${error.message}</small>
                    </div>`;
            }
        }

        function toggleDetalle(id) {
            const el = document.getElementById(`detalle-${id}`);
            const todasLasDems = document.querySelectorAll('.entry-details');
            
            // Opcional: cierra los otros para que se vea más ordenado
            todasLasDems.forEach(d => {
                if(d.id !== `detalle-${id}`) d.style.display = 'none';
            });

            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        window.onload = cargarLibro;
    </script>
</body>
</html>
