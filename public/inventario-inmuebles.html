<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario Inmobiliario | ContaSistemas S.A.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary-dark: #0f172a; --accent-cyan: #06b6d4; --bg-body: #f8fafc; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { display: flex; height: 100vh; background-color: var(--bg-body); }
        
        .sidebar { width: 280px; background-color: var(--primary-dark); color: white; padding: 30px 20px; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 15px; color: #94a3b8; text-decoration: none; border-radius: 12px; margin-bottom: 5px; }
        .nav-link.active { background: rgba(6, 182, 212, 0.1); color: var(--accent-cyan); font-weight: 700; }

        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .grid-inmuebles { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 30px; }
        
        .card-bien { background: var(--white); border-radius: 20px; overflow: hidden; shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; transition: 0.3s; }
        .card-bien:hover { transform: translateY(-5px); }
        .card-header { padding: 20px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .status-disponible { background: #dcfce7; color: #166534; }
        .status-vendido { background: #fee2e2; color: #991b1b; }
        
        .card-body { padding: 20px; }
        .price-box { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #e2e8f0; }
        .btn-vender { width: 100%; margin-top: 15px; padding: 12px; border-radius: 10px; border: none; background: var(--primary-dark); color: white; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div style="margin-bottom: 40px; font-weight: 800;"><i class="fas fa-building-columns"></i> CAJA & INMOBILIARIA</div>
        <a href="panel.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
        <a href="gestion-socios.html" class="nav-link"><i class="fas fa-users"></i> Gestión</a>
        <a href="inventario-inmuebles.html" class="nav-link active"><i class="fas fa-map-location-dot"></i> Inventario Bienes</a>
    </aside>

    <main class="main-content">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Inventario de Propiedades</h1>
            <button onclick="location.href='gestion-socios.html'" style="padding: 10px 20px; border-radius: 10px; background: var(--accent-cyan); border: none; font-weight: 700;">+ Nuevo Bien</button>
        </header>

        <div class="grid-inmuebles" id="contenedorInmuebles">
            </div>
    </main>

    <script>
        async function cargarInmuebles() {
            const res = await fetch('/api/gestion/inmuebles-lista');
            const data = await res.json();
            const container = document.getElementById('contenedorInmuebles');
            
            container.innerHTML = data.map(i => `
                <div class="card-bien">
                    <div class="card-header">
                        <span style="font-weight: 800;">${i.codigo}</span>
                        <span class="status-badge status-${i.estado.toLowerCase()}">${i.estado}</span>
                    </div>
                    <div class="card-body">
                        <p style="color: #64748b; font-size: 0.9rem;">${i.tipo_bien}</p>
                        <div class="price-box">
                            <small style="color: #94a3b8;">Precio de Venta</small>
                            <h2 style="color: var(--primary-dark);">$${parseFloat(i.precio_venta).toLocaleString()}</h2>
                        </div>
                        ${i.estado === 'Disponible' ? 
                            `<button class="btn-vender" onclick="venderInmueble(${i.id}, ${i.precio_venta})">Registrar Venta</button>` : 
                            `<p style="margin-top:15px; color: #166534; font-weight:700;"><i class="fas fa-check-circle"></i> Propiedad Liquidada</p>`}
                    </div>
                </div>
            `).join('');
        }

        async function venderInmueble(id, precio) {
            if(!confirm("¿Confirmar la venta de esta propiedad?")) return;
            
            const res = await fetch('/api/sales/procesar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    tipo_operacion: 'venta_inmueble',
                    property_id: id,
                    total: precio
                })
            });

            if((await res.json()).success) {
                alert("Venta procesada y ganancia registrada en contabilidad.");
                cargarInmuebles();
            }
        }

        document.addEventListener('DOMContentLoaded', cargarInmuebles);
    </script>
</body>
</html>
